<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>MonoStyle Shop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* НОВИЙ ФОН (радіальний градієнт + анімація диму) */
    body {
        background: radial-gradient(circle at center, #1a1a1a 0%, #050505 70%);
        font-family: 'Segoe UI', 'Poppins', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
        position: relative;
    }

    /* Анімований дим */
    body::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 60%);
        animation: smoke 25s linear infinite;
        pointer-events: none;
        z-index: 0;
    }

    @keyframes smoke {
        0% { transform: translate(-10%, -10%); }
        50% { transform: translate(10%, 10%); }
        100% { transform: translate(-10%, -10%); }
    }

    /* КАРТОЧКА (скло) */
    .social-card {
        max-width: 420px;
        width: 100%;
        background: rgba(20,20,20,0.6);
        backdrop-filter: blur(20px);
        border-radius: 28px;
        padding: 30px 26px;
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 0 40px rgba(255,255,255,0.05),
                    0 20px 60px rgba(0,0,0,0.8);
        text-align: center;
        position: relative;
        z-index: 1;
        animation: fadeUp 0.6s ease;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .social-card::after {
        content: "";
        position: absolute;
        inset: -2px;
        border-radius: 30px;
        background: linear-gradient(120deg, transparent, rgba(255,255,255,0.08), transparent);
        z-index: -1;
    }

    /* Аватарка (кругла) */
    .avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 15px;
        border: 2px solid rgba(255,255,255,0.3);
        box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    /* Текст */
    .social-title {
        font-size: 20px;
        color: #aaa;
        margin-bottom: 10px;
    }

    .brand {
        font-size: 30px;
        font-weight: 800;
        letter-spacing: 3px;
        background: linear-gradient(180deg, #fff, #777);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 12px rgba(255,255,255,0.25);
        margin-bottom: 30px;
    }

    /* Список соцмереж */
    .social-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 18px;
    }

    .social-item {
        display: flex;
        align-items: center;
        gap: 18px;
        background: rgba(30,30,30,0.6);
        border: 1px solid rgba(255,255,255,0.05);
        padding: 14px 20px;
        border-radius: 50px;
        backdrop-filter: blur(10px);
        cursor: pointer;
        transition: 0.25s;
        position: relative;
        overflow: hidden;
    }

    .social-item:hover {
        transform: translateY(-4px) scale(1.02);
        box-shadow: 0 0 20px rgba(255,255,255,0.08),
                    0 10px 30px rgba(0,0,0,0.8);
    }

    .social-icon {
        font-size: 24px;
        width: 36px;
        text-align: center;
        transition: 0.2s;
    }

    .social-item:hover .social-icon {
        transform: scale(1.1) rotate(3deg);
    }

    .social-name {
        flex: 1;
        color: #eee;
        font-size: 16px;
    }

    .social-link {
        color: #aaa;
        font-size: 14px;
        text-decoration: none;
        transition: 0.2s;
    }

    .social-link:hover {
        color: #fff;
    }

    .copy-icon {
        margin-left: 8px;
        color: #555;
        cursor: pointer;
        opacity: 0;
        transition: 0.2s;
    }

    .social-item:hover .copy-icon {
        opacity: 1;
    }

    .copy-icon:hover {
        color: #fff;
    }

    /* Кольори іконок */
    [data-social="instagram"] .social-icon { color: #E4405F; }
    [data-social="telegram"] .social-icon { color: #26A5E4; }

    /* Ripple */
    .ripple {
        position: absolute;
        border-radius: 50%;
        background: rgba(255,255,255,0.2);
        transform: scale(0);
        animation: rippleAnim 0.5s linear;
        pointer-events: none;
    }

    @keyframes rippleAnim {
        to {
            transform: scale(15);
            opacity: 0;
        }
    }

    /* Toast */
    #toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #222;
        color: white;
        padding: 8px 20px;
        border-radius: 30px;
        opacity: 0;
        transition: 0.3s;
        z-index: 2;
        font-size: 14px;
        pointer-events: none;
    }

    @media (max-width: 480px) {
        .social-card { width: 90%; padding: 20px; }
        .brand { font-size: 24px; }
        .avatar { width: 60px; height: 60px; }
    }
</style>
</head>
<body>

<div class="social-card">
    <!-- Кругла аватарка -->
    <img src="ava.jpg" alt="avatar" class="avatar" onerror="this.style.display='none'">
    <div class="social-title">Наші соцмережі</div>
    <div class="brand">MONOSTYLE</div>

    <ul class="social-list">
        <li class="social-item" data-social="instagram">
            <div class="social-icon"><i class="fab fa-instagram"></i></div>
            <span class="social-name">Instagram</span>
            <a href="https://www.instagram.com/monostyle_shops/" target="_blank" rel="noopener noreferrer" class="social-link">→ перейти</a>
            <i class="fas fa-copy copy-icon" data-copy="https://www.instagram.com/monostyle_shops/"></i>
        </li>
        <li class="social-item" data-social="telegram">
            <div class="social-icon"><i class="fab fa-telegram-plane"></i></div>
            <span class="social-name">Telegram</span>
            <a href="https://t.me/+uq_uHi2QslBlNWMy" target="_blank" rel="noopener noreferrer" class="social-link">→ перейти</a>
            <i class="fas fa-copy copy-icon" data-copy="https://t.me/+uq_uHi2QslBlNWMy"></i>
        </li>
    </ul>
</div>

<div id="toast">Скопійовано!</div>

<script>
    function showToast() {
        const toast = document.getElementById('toast');
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 1500);
    }

    function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(showToast).catch(() => fallbackCopy(text));
        } else {
            fallbackCopy(text);
        }
    }

    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast();
    }

    function vibrate() {
        if (navigator.vibrate) navigator.vibrate(50);
    }

    // Копіювання по кліку на іконку
    document.querySelectorAll('.copy-icon').forEach(icon => {
        icon.addEventListener('click', (e) => {
            e.stopPropagation();
            copyToClipboard(icon.getAttribute('data-copy'));
            vibrate();
        });
    });

    // Ripple + перехід по кліку на рядок
    document.querySelectorAll('.social-item').forEach(item => {
        item.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('copy-icon')) return;
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            const rect = item.getBoundingClientRect();
            ripple.style.left = (e.clientX - rect.left) + 'px';
            ripple.style.top = (e.clientY - rect.top) + 'px';
            item.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);
        });

        item.addEventListener('click', (e) => {
            if (e.target.classList.contains('copy-icon')) return;
            const link = item.querySelector('a');
            if (link) {
                window.open(link.href, '_blank');
                vibrate();
            }
        });
    });
</script>
</body>
</html>
